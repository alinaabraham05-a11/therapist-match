<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clearapy</title>
</head>
<body>
<script>
  var variant = localStorage.getItem('mm_variant');
  if (!variant) {
    var variants = ['v1','v2','v3','v4','v5','v6'];
    variant = variants[Math.floor(Math.random() * variants.length)];
    localStorage.setItem('mm_variant', variant);
  }
  window.location.replace(variant + '.html');
</script>
</body>
</html>
